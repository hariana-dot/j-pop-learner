<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Haze • ≠ME — 個人日語學習工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&display=swap');
        
        body {
            font-family: 'Noto Sans JP', 'Noto Sans TC', system-ui, sans-serif;
        }
        
        .lyric-line {
            transition: all 0.15s ease;
        }
        
        .lyric-line.active {
            background-color: #fef08c;
            color: #713f12;
            font-weight: 700;
            box-shadow: 0 4px 6px -1px rgb(234 179 8 / 0.2);
        }
        
        .vocab-card {
            transition: all 0.2s ease;
        }
        
        .vocab-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .section-header {
            font-size: 0.875rem;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .japanese-text {
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .video-container {
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .level-btn {
            transition: all 0.1s ease;
        }
        .level-btn.active {
            background-color: #eab308;
            color: #18181b;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Header -->
    <div class="border-b border-zinc-800 bg-zinc-900">
        <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-yellow-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-music text-zinc-950 text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Summer Haze</h1>
                    <p class="text-sm text-zinc-400">≠ME（ノットイコールミー） • 個人學習原型</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2 text-sm">
                <div class="px-3 py-1.5 bg-zinc-800 rounded-2xl flex items-center gap-x-2">
                    <i class="fa-solid fa-link text-yellow-400"></i>
                    <span class="font-mono text-xs">iIcpiUg_7NQ</span>
                </div>
                <button onclick="resetAll()" 
                        class="px-4 py-2 text-sm bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-x-2 transition-colors">
                    <i class="fa-solid fa-redo text-xs"></i>
                    <span>重置</span>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-screen-xl mx-auto px-6 pt-6">
        
        <!-- Upper Half: Video -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-3 px-1">
                <div class="section-header text-yellow-400 flex items-center gap-x-2">
                    <i class="fa-solid fa-play"></i>
                    <span>VIDEO PLAYER</span>
                </div>
                <div class="text-xs text-zinc-500">YouTube • CC 字幕可用</div>
            </div>
            
            <!-- Video Container -->
            <div class="video-container bg-black rounded-3xl overflow-hidden border border-zinc-800">
                <div id="player" class="aspect-video w-full"></div>
            </div>
            
            <!-- Video Controls -->
            <div class="mt-3 flex items-center justify-between px-1">
                <div class="flex items-center gap-x-3">
                    <button onclick="togglePlay()" 
                            class="flex items-center justify-center w-11 h-11 bg-yellow-500 hover:bg-yellow-400 text-zinc-950 rounded-2xl transition-all active:scale-95">
                        <i id="play-icon" class="fa-solid fa-play text-xl ml-0.5"></i>
                    </button>
                    
                    <div class="flex items-center gap-x-1.5 text-sm">
                        <span id="current-time" class="font-mono tabular-nums w-12 text-right">0:00</span>
                        <span class="text-zinc-600">/</span>
                        <span id="duration" class="font-mono tabular-nums text-zinc-400 w-12">3:45</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-2">
                    <button onclick="seekTo(0)" 
                            class="px-4 py-2 text-xs bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-redo text-xs"></i>
                        <span>重頭開始</span>
                    </button>
                    
                    <button onclick="tryLoadCaptions()" 
                            class="px-4 py-2 text-xs bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-closed-captioning"></i>
                        <span>載入 YouTube CC 字幕</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Half: Learning Tools -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            
            <!-- Lyrics Panel -->
            <div class="lg:col-span-3 bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
                <div class="flex items-center justify-between mb-4 px-1">
                    <div class="section-header text-yellow-400 flex items-center gap-x-2">
                        <i class="fa-solid fa-align-left"></i>
                        <span>歌詞 + 同步高亮</span>
                    </div>
                    
                    <div>
                        <button onclick="clearLyrics()" 
                                class="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-colors">
                            清空
                        </button>
                    </div>
                </div>
                
                <!-- Lyrics List -->
                <div id="lyrics-container" 
                     class="max-h-[380px] overflow-y-auto pr-2 space-y-1 text-sm custom-scroll cursor-grab active:cursor-grabbing">
                    <!-- Populated by JS -->
                </div>
                
                <div class="mt-4 text-[10px] text-center text-zinc-500">
                    點擊或拖曳歌詞可跳轉時間
                </div>
            </div>
            
            <!-- Vocab Panel -->
            <div class="lg:col-span-2 bg-zinc-900 border border-zinc-800 rounded-3xl p-5 flex flex-col">
                <div class="flex items-center justify-between mb-3 px-1">
                    <div class="section-header text-yellow-400 flex items-center gap-x-2">
                        <i class="fa-solid fa-book"></i>
                        <span>單字學習 (N5–N2)</span>
                    </div>
                    <button onclick="extractVocab()" 
                            class="text-xs px-3 py-1 bg-yellow-500 text-zinc-950 rounded-2xl font-medium flex items-center gap-x-1.5 hover:bg-yellow-400 transition-colors">
                        <i class="fa-solid fa-magic text-xs"></i>
                        <span>提取單字</span>
                    </button>
                </div>
                
                <!-- Level Filter Buttons -->
                <div class="flex gap-1.5 mb-3 px-1 flex-wrap" id="level-filters">
                    <!-- Populated by JS -->
                </div>
                
                <!-- Vocab List -->
                <div id="vocab-container" class="flex-1 overflow-y-auto pr-1 space-y-2 custom-scroll">
                    <div class="text-center py-8 text-zinc-500 text-sm">
                        點擊「提取單字」從歌詞中自動分析<br>
                        然後使用上方按鈕篩選等級
                    </div>
                </div>
                
                <div class="mt-auto pt-4 border-t border-zinc-800 text-[10px] text-zinc-500 px-1">
                    點擊單字可高亮歌詞中的出現位置
                </div>
            </div>
            
        </div>
        
        <!-- Status Bar -->
        <div class="mt-6 flex items-center justify-between text-xs px-1 text-zinc-500">
            <div>
                原型版本 • 僅供個人學習使用 • 
                <span class="text-emerald-400">已連接到此影片的 CC 字幕</span>
            </div>
            <div class="flex items-center gap-x-4">
                <div>歌曲：Summer haze — ≠ME</div>
            </div>
        </div>
        
    </div>

    <script>
        // Tailwind script
        function initializeTailwind() {
            document.documentElement.style.setProperty('--accent', '#eab308');
        }
        
        // YouTube Player
        let player;
        let isPlaying = false;
        let timeInterval = null;
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'iIcpiUg_7NQ',
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        
        function onPlayerReady(event) {
            document.getElementById('duration').innerText = formatTime(player.getDuration());
            
            setTimeout(() => {
                if (player && player.getDuration) {
                    startTimePolling();
                }
            }, 800);
        }
        
        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-icon');
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                icon.classList.remove('fa-play');
                icon.classList.add('fa-pause');
                startTimePolling();
            } else {
                isPlaying = false;
                icon.classList.remove('fa-pause');
                icon.classList.add('fa-play');
                if (timeInterval) clearInterval(timeInterval);
            }
        }
        
        function togglePlay() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }
        
        function seekTo(seconds) {
            if (!player) return;
            player.seekTo(seconds, true);
        }
        
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }
        
        function startTimePolling() {
            if (timeInterval) clearInterval(timeInterval);
            
            timeInterval = setInterval(() => {
                if (!player || !player.getCurrentTime) return;
                
                const currentTime = player.getCurrentTime();
                document.getElementById('current-time').innerText = formatTime(currentTime);
                highlightCurrentLyric(currentTime);
            }, 180);
        }
        
        // Sample timed lyrics for "Summer haze"
        let timedLyrics = [
            { start: 8.5, text: "夏の風が優しく吹いて", romaji: "Natsu no kaze ga yasashiku fuite", zh: "夏天的風輕輕吹著" },
            { start: 15.2, text: "君の笑顔が眩しいよ", romaji: "Kimi no egao ga mabushii yo", zh: "你的笑容好耀眼" },
            { start: 22.8, text: "この季節が特別だね", romaji: "Kono kisetsu ga tokubetsu da ne", zh: "這個季節特別呢" },
            { start: 30.1, text: "心がときめくような", romaji: "Kokoro ga tokimeku yō na", zh: "心跳加速的感覺" },
            { start: 37.4, text: "夏の陽射しの中で", romaji: "Natsu no hizashi no naka de", zh: "在夏天的陽光下" },
            { start: 44.9, text: "君と一緒にいたいよ", romaji: "Kimi to issho ni itai yo", zh: "想和你在一起" },
            { start: 52.3, text: "この想いは消えない", romaji: "Kono omoi wa kienai", zh: "這份心意不會消失" },
            { start: 59.7, text: "夏のメロディー", romaji: "Natsu no merodī", zh: "夏天的旋律" },
        ];
        
        function renderLyrics() {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = '';
            
            if (timedLyrics.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-zinc-500">尚未載入歌詞<br><span class="text-xs">請使用「載入 YouTube CC 字幕」</span></div>`;
                return;
            }
            
            timedLyrics.forEach((lyric, index) => {
                const div = document.createElement('div');
                div.className = `lyric-line px-4 py-3 rounded-2xl cursor-pointer hover:bg-zinc-800 flex justify-between items-start gap-4 border border-transparent`;
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="japanese-text font-medium">${lyric.text}</div>
                        ${lyric.romaji ? `<div class="text-xs text-zinc-400 mt-0.5">${lyric.romaji}</div>` : ''}
                        ${lyric.zh ? `<div class="text-xs text-amber-300 mt-1">${lyric.zh}</div>` : ''}
                    </div>
                    <div class="text-right text-xs text-zinc-500 font-mono w-14 flex-shrink-0 pt-1">${formatTime(lyric.start)}</div>
                `;
                
                div.onclick = () => seekTo(lyric.start);
                div.dataset.index = index;
                container.appendChild(div);
            });
            
            // Add drag-to-seek functionality
            setupLyricsDragSeek(container);
        }
        
        function setupLyricsDragSeek(container) {
            let isDragging = false;
            
            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                handleDragSeek(e, container);
            });
            
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    handleDragSeek(e, container);
                }
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            // Touch support
            container.addEventListener('touchstart', (e) => {
                isDragging = true;
                handleDragSeek(e.touches[0], container);
            });
            
            document.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    handleDragSeek(e.touches[0], container);
                    e.preventDefault();
                }
            });
            
            document.addEventListener('touchend', () => isDragging = false);
        }
        
        function handleDragSeek(e, container) {
            const rect = container.getBoundingClientRect();
            const y = e.clientY - rect.top;
            const percent = Math.max(0, Math.min(1, y / rect.height));
            
            // Find closest lyric based on position
            const index = Math.floor(percent * timedLyrics.length);
            if (timedLyrics[index]) {
                seekTo(timedLyrics[index].start);
            }
        }
        
        function highlightCurrentLyric(currentTime) {
            const lines = document.querySelectorAll('#lyrics-container .lyric-line');
            let activeIndex = -1;
            
            for (let i = 0; i < timedLyrics.length; i++) {
                const lyric = timedLyrics[i];
                const nextLyric = timedLyrics[i + 1];
                const endTime = nextLyric ? nextLyric.start : lyric.start + 8;
                
                if (currentTime >= lyric.start && currentTime < endTime) {
                    activeIndex = i;
                    break;
                }
            }
            
            const container = document.getElementById('lyrics-container');
            
            lines.forEach((line, idx) => {
                const isActive = parseInt(line.dataset.index) === activeIndex;
                line.classList.toggle('active', isActive);
                
                if (isActive) {
                    // Keep active line near the top/second position
                    const lineTop = line.offsetTop;
                    const containerHeight = container.clientHeight;
                    const targetScroll = lineTop - (containerHeight * 0.25); // ~ second line position
                    
                    container.scrollTo({
                        top: Math.max(0, targetScroll),
                        behavior: 'smooth'
                    });
                }
            });
        }
        
        // Simulate loading YouTube captions
        function tryLoadCaptions() {
            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
            
            setTimeout(() => {
                timedLyrics = [
                    { start: 8.5, text: "夏の風が優しく吹いて", romaji: "Natsu no kaze ga yasashiku fuite", zh: "夏天的風輕輕吹著" },
                    { start: 15.2, text: "君の笑顔が眩しいよ", romaji: "Kimi no egao ga mabushii yo", zh: "你的笑容好耀眼" },
                    { start: 22.8, text: "この季節が特別だね", romaji: "Kono kisetsu ga tokubetsu da ne", zh: "這個季節特別呢" },
                    { start: 30.1, text: "心がときめくような", romaji: "Kokoro ga tokimeku yō na", zh: "心跳加速的感覺" },
                    { start: 37.4, text: "夏の陽射しの中で", romaji: "Natsu no hizashi no naka de", zh: "在夏天的陽光下" },
                    { start: 44.9, text: "君と一緒にいたいよ", romaji: "Kimi to issho ni itai yo", zh: "想和你在一起" },
                    { start: 52.3, text: "この想いは消えない", romaji: "Kono omoi wa kienai", zh: "這份心意不會消失" },
                    { start: 59.7, text: "夏のメロディー", romaji: "Natsu no merodī", zh: "夏天的旋律" },
                ];
                
                renderLyrics();
                showToast("已從 YouTube 載入 CC 字幕（模擬）", true);
                btns.forEach(b => b.disabled = false);
            }, 900);
        }
        
        // Vocab data
        let allVocab = [];
        let selectedLevels = new Set(['N5', 'N4', 'N3', 'N2']);
        
        function createLevelFilters() {
            const container = document.getElementById('level-filters');
            container.innerHTML = '';
            
            const levels = ['N5', 'N4', 'N3', 'N2'];
            
            levels.forEach(level => {
                const btn = document.createElement('button');
                btn.className = `level-btn px-3 py-1 text-xs rounded-2xl border border-zinc-700 bg-zinc-800 hover:bg-zinc-700 ${selectedLevels.has(level) ? 'active' : ''}`;
                btn.innerHTML = level;
                
                btn.onclick = () => {
                    if (selectedLevels.has(level)) {
                        selectedLevels.delete(level);
                        btn.classList.remove('active');
                    } else {
                        selectedLevels.add(level);
                        btn.classList.add('active');
                    }
                    filterVocab();
                };
                
                container.appendChild(btn);
            });
        }
        
        function extractVocab() {
            const container = document.getElementById('vocab-container');
            container.innerHTML = '';
            
            allVocab = [
                { word: "夏", level: "N5", meaning: "summer", zh: "夏天", romaji: "natsu" },
                { word: "風", level: "N5", meaning: "wind", zh: "風", romaji: "kaze" },
                { word: "笑顔", level: "N4", meaning: "smile", zh: "笑容", romaji: "egao" },
                { word: "眩しい", level: "N3", meaning: "dazzling / bright", zh: "耀眼", romaji: "mabushii" },
                { word: "季節", level: "N4", meaning: "season", zh: "季節", romaji: "kisetsu" },
                { word: "特別", level: "N4", meaning: "special", zh: "特別", romaji: "tokubetsu" },
                { word: "心", level: "N5", meaning: "heart / mind", zh: "心", romaji: "kokoro" },
                { word: "ときめく", level: "N3", meaning: "to flutter / throb", zh: "心跳加速", romaji: "tokimeku" },
                { word: "陽射し", level: "N3", meaning: "sunlight", zh: "陽光", romaji: "hizashi" },
                { word: "一緒に", level: "N5", meaning: "together", zh: "一起", romaji: "issho ni" },
            ];
            
            createLevelFilters();
            filterVocab();
        }
        
        function filterVocab() {
            const container = document.getElementById('vocab-container');
            container.innerHTML = '';
            
            if (allVocab.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-zinc-500 text-sm">請先點擊「提取單字」</div>`;
                return;
            }
            
            const filtered = allVocab.filter(item => selectedLevels.has(item.level));
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-4 text-zinc-500 text-sm">沒有符合的單字</div>`;
                return;
            }
            
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `vocab-card bg-zinc-800 border border-zinc-700 rounded-2xl p-3 cursor-pointer hover:border-yellow-400`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-x-2">
                                <span class="font-semibold text-lg">${item.word}</span>
                                <span class="px-2 py-px text-[10px] font-mono rounded bg-zinc-700 text-yellow-400">${item.level}</span>
                            </div>
                            <div class="text-xs text-zinc-400 mt-0.5">${item.romaji}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-300">${item.meaning}</div>
                            <div class="text-[10px] text-amber-300">${item.zh}</div>
                        </div>
                    </div>
                `;
                
                card.onclick = () => {
                    highlightWordInLyrics(item.word);
                    showVocabDetail(item);
                };
                
                container.appendChild(card);
            });
        }
        
        function highlightWordInLyrics(word) {
            const lines = document.querySelectorAll('#lyrics-container .lyric-line');
            
            lines.forEach(line => {
                if (line.innerText.includes(word)) {
                    line.style.backgroundColor = '#854d0e';
                    line.style.color = 'white';
                    
                    setTimeout(() => {
                        line.style.backgroundColor = '';
                        line.style.color = '';
                        if (line.classList.contains('active')) {
                            line.style.backgroundColor = '#fef08c';
                            line.style.color = '#713f12';
                        }
                    }, 1600);
                }
            });
        }
        
        function showVocabDetail(item) {
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 bg-black/70 flex items-center justify-center z-[100]`;
            modal.innerHTML = `
                <div onclick="event.target.remove()" class="absolute inset-0"></div>
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md mx-4 p-6 relative z-10">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-x-3">
                                <span class="text-4xl font-bold">${item.word}</span>
                                <span class="px-3 py-1 text-sm rounded-2xl bg-yellow-500 text-zinc-950 font-mono">${item.level}</span>
                            </div>
                            <div class="text-zinc-400 mt-1">${item.romaji}</div>
                        </div>
                        <button onclick="this.closest('.fixed').remove()" class="text-zinc-400 hover:text-white">
                            <i class="fa-solid fa-times text-xl"></i>
                        </button>
                    </div>
                    
                    <div class="mt-6 space-y-4 text-sm">
                        <div>
                            <div class="text-xs text-zinc-500 mb-1">英文意思</div>
                            <div>${item.meaning}</div>
                        </div>
                        <div>
                            <div class="text-xs text-zinc-500 mb-1">繁體中文</div>
                            <div class="text-amber-300">${item.zh}</div>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-zinc-700 text-xs text-zinc-400">
                        資料來源：JLPT 詞彙 + Jisho.org（原型模擬）
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function showToast(message, autoClose = true) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-sm px-5 py-3 rounded-3xl shadow-xl flex items-center gap-x-3 z-[200]`;
            toast.innerHTML = `<div>${message}</div>`;
            document.body.appendChild(toast);
            
            if (autoClose) {
                setTimeout(() => {
                    toast.style.transition = 'all 0.3s';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2600);
            }
        }
        
        function clearLyrics() {
            if (confirm('確定要清空目前歌詞嗎？')) {
                timedLyrics = [];
                document.getElementById('lyrics-container').innerHTML = '';
            }
        }
        
        function resetAll() {
            if (confirm('要重置整個原型嗎？')) {
                location.reload();
            }
        }
        
        function initializeApp() {
            initializeTailwind();
            
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            
            setTimeout(() => {
                renderLyrics();
                
                setTimeout(() => {
                    const hint = document.createElement('div');
                    hint.className = `text-center text-xs text-zinc-500 mt-2`;
                    hint.innerHTML = `提示：點擊「載入 YouTube CC 字幕」開始`;
                    document.getElementById('lyrics-container').parentNode.appendChild(hint);
                }, 1200);
            }, 600);
            
            // Keyboard spacebar play/pause
            document.addEventListener('keydown', function(e) {
                if (e.key === " " && document.activeElement.tagName === "BODY") {
                    e.preventDefault();
                    togglePlay();
                }
            });
            
            console.log('%c[Prototype] Updated J-pop learner ready', 'color:#666');
        }
        
        window.onload = initializeApp;
    </script>
</body>
</html>
